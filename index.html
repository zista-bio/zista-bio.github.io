<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>زیستا | آموزش زیست شناسی</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:#f5f8fc;
color:#222;
}

header{
background:#002b6f;
padding:15px 50px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
height:70px;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-size:18px;
}

.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:60px;
background:white;
}

.hero-text{
width:50%;
}

.hero-image{
width:45%;
}

.hero-image img{
width:100%;
border-radius:30px;
}

.hero h1{
font-size:80px;
color:#003b8e;
margin-bottom:10px;
}

.hero h2{
color:#00a86b;
margin-bottom:20px;
}

.hero p{
font-size:20px;
line-height:2;
margin-bottom:25px;
}

.btn{
display:inline-block;
padding:15px 35px;
background:#00b978;
color:white;
text-decoration:none;
border-radius:12px;
font-size:18px;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
padding:40px;
flex-wrap:wrap;
}

.stat{
background:white;
width:220px;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
text-align:center;
}

.stat h3{
font-size:38px;
color:#0066ff;
}

.section-title{
text-align:center;
font-size:40px;
margin:50px 0;
color:#002b6f;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:0 50px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card h3{
margin-bottom:15px;
color:#003b8e;
}

.about{
display:flex;
align-items:center;
justify-content:space-between;
padding:60px;
margin-top:60px;
background:#eaf9f3;
}

.about img{
width:40%;
border-radius:25px;
}

.about-text{
width:55%;
}

.about-text h2{
margin-bottom:20px;
color:#003b8e;
}

.about-text p{
line-height:2;
font-size:18px;
}

.instagram{
margin:50px;
padding:35px;
border-radius:20px;
background:linear-gradient(135deg,#f6d6ff,#d8e6ff);
text-align:center;
}

footer{
background:#002b6f;
color:white;
text-align:center;
padding:30px;
margin-top:50px;
}

@media(max-width:768px){

header{
padding:15px;
flex-direction:column;
}

nav{
margin-top:15px;
}

.hero{
flex-direction:column-reverse;
padding:20px;
}

.hero-text,
.hero-image{
width:100%;
text-align:center;
}

.hero h1{
font-size:55px;
}

.about{
flex-direction:column;
padding:20px;
}

.about img,
.about-text{
width:100%;
}

.cards{
padding:20px;
}

}

</style>
</head>

<body>

<div class="hero">
  <img src="logo.png" width="180">
<h1>زیستا</h1>
<p>آزمون، تکلیف و آموزش زیست‌شناسی</p>
<a class="btn" href="#">ورود به آزمون‌ها</a>
</div>

<div class="section">

<div class="card">
<h2>آزمون‌های فصل به فصل</h2>
<p>ویژه زیست دهم</p>
</div>

<div class="card">
<h2>پاسخنامه تشریحی</h2>
<p>تحلیل کامل گزینه‌ها</p>
</div>

<div class="card">
<h2>شاخص زیستا</h2>
<p>تحلیل عملکرد و میزان تسلط</p>
</div>

</div>

<div class="footer">
Zista Biology
</div>

</body>
</html>
