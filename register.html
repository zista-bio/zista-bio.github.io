<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ثبت نام | زیستا</title>

<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
background:#f5f8fc;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:white;
width:100%;
max-width:450px;
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:90px;
}

h1{
text-align:center;
color:#062250;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#64748b;
margin-bottom:30px;
}

.input-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
color:#334155;
}

input{
width:100%;
padding:14px;
border:1px solid #cbd5e1;
border-radius:12px;
font-size:15px;
}

input:focus{
outline:none;
border-color:#00b978;
}

button{
width:100%;
background:#00b978;
color:white;
border:none;
padding:15px;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#009966;
}

.back{
display:block;
text-align:center;
margin-top:20px;
color:#00b978;
text-decoration:none;
}

.message{
margin-top:15px;
text-align:center;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png" alt="زیستا">
</div>

<h1>ثبت نام دانش آموز</h1>

<p class="subtitle">
کد دانش آموزی و شماره تماس خود را وارد کنید
</p>

<form id="registerForm">

<div class="input-group">
<label>کد دانش آموزی</label>
<input type="text" id="studentCode" required>
</div>

<div class="input-group">
<label>شماره تماس</label>
<input type="tel" id="phone" required>
</div>

<button type="submit">
ثبت اطلاعات
</button>

</form>

<div id="message" class="message"></div>

<a href="index.html" class="back">
بازگشت به صفحه اصلی
</a>

</div>

<script>

const validCodes = [
"QTRM7","BKLA2","XZPN5","HJRD8","MVTK1","PLQW4","CYNA9","GTRB3","FKZE6","NJXP0",
"RMLA7","TWQC2","VPKN8","DZHY1","LKMR5","BJTF9","XPQA4","CNWR6","GTML3","HZPK7",
"RYTA2","QWKP8","MJDN1","BXTR5","LQZA0","NVPH4","CKRM7","TPXY2","GJLA8","WFNZ3",
"YTRM6","PLKD1","XQWA5","BZNH9","MKTP4","CRYL7","HJPX0","VNQA8","DZTM2","FKLR5",
"QTNB1","WJXA7","MLRP3","CYTK9","BNQH4","XPZM6","GKLA2","TRWD8","HNYP5","VLQA0",
"DJKM7","PRTX1","ZYLA4","CKWN8","MQTB2","FXPR9","GNLA5","HTWK0","BJQM7","RVXP3",
"LKTA8","CPWN2","MYQH6","DZTR1","XKLP9","GNWB4","HTRA7","QJXM0","PLZN5","CVTK8",
"RYWP2","MKQA6","BTNL1","HJXR9","FWPM4","DZLA7","CKTR0","VNQP5","GYWM8","LTKA2",
"QZRP6","XNTA1","BKWM9","HJLP4","CRTX7","MVQA0","PYKN5","DLTR8","GWXM2","FKPA6",
"NJTR1","QWLA9","BZMP4","HTKN7","CYXR0","VLTP5","GMQA8","RKWN2","DJLP6","XTMR1"
];

document.getElementById("registerForm")
.addEventListener("submit",function(e){

e.preventDefault();

let code=document.getElementById("studentCode").value;
let phone=document.getElementById("phone").value;

if(validCodes.includes(code)){

document.getElementById("message").innerHTML=
"✅ ثبت نام با موفقیت انجام شد";

localStorage.setItem("studentCode",code);
localStorage.setItem("phone",phone);

setTimeout(()=>{
window.location.href="index.html";
},1500);

}else{

document.getElementById("message").innerHTML=
"❌ کد دانش آموزی معتبر نیست";

}

});
</script>

</body>
</html>
